<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --primary-purple: #4b0082; /* Deep Indigo Purple */
            --accent-purple: #bc8cf2;
            --text-color: #f2f2f2;
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        /* The Physical Card look */
        .invitation-card {
            background-color: var(--bg-color);
            width: 450px;
            padding: 60px;
            text-align: center;
            border: 2px solid var(--primary-purple);
            box-shadow: 0 0 50px rgba(75, 0, 130, 0.5);
            position: relative;
            color: var(--text-color);
        }

        /* Decorative Corner Accents */
        .invitation-card::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(188, 140, 242, 0.2);
            pointer-events: none;
        }

        .parents-section {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-purple);
            margin-bottom: 30px;
        }

        .request-text {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .couple-names {
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            color: var(--accent-purple);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .event-details {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            margin: 40px 0;
            border-top: 1px solid var(--primary-purple);
            border-bottom: 1px solid var(--primary-purple);
            padding: 20px 0;
        }

        .location {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        .contact-footer {
            margin-top: 40px;
            font-size: 12px;
            line-height: 1.8;
        }

        .color-note {
            margin-top: 30px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-purple);
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="parents-section">
            Paracida Da Silva & Pasha Sr.
        </div>

        <div class="request-text">
            Request the honor of your presence at the marriage of their children
        </div>

        <div class="couple-names">
            Celisia & Pasha
        </div>

        <div class="event-details">
            Friday, May 22, 2026
            <span class="location">Marilia, Brazil</span>
        </div>

        <div class="contact-footer">
            <strong>RSVP Information</strong><br>
            Pasha: +1 (316) 296-2630<br>
            Celisia: +55 14 99696-2452
        </div>

        <div class="color-note">
            Dress Code: Purple & Black
        </div>
    </div>

</body>
</html>
